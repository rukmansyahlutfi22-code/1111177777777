<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Desa</title>
    <link rel="manifest" href='data:application/manifest+json,{"name":"Absensi Desa","short_name":"Absen","start_url":"./index.html","display":"standalone","background_color":"#ffffff","theme_color":"#2e7d32","icons":[{"src":"https://raw.githubusercontent.com/rukmansyahlutfi22-code/1111177777777/main/Kabupaten%20Kotabaru.png","sizes":"512x512","type":"image/png"}]}'>
    <style>
        :root { --utama: #2e7d32; --aksen: #ff4081; }
        body { 
            /* Latar belakang lebih hidup dengan gradasi */
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .app-container { 
            background: rgba(255, 255, 255, 0.95); /* Sedikit transparan agar terlihat efek glassmorphism */
            width: 100%; max-width: 400px; padding: 30px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
        }
        /* Logo tanpa lingkaran luar */
        .logo-desa { width: 120px; height: auto; margin-bottom: 20px; }
        .btn-aksi { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--utama); color: white; font-weight: bold; cursor: pointer; }
        #main-app { display: none; }
        /* Kontrol Kamera */
        .kamera-box { position: relative; width: 100%; height: 300px; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .btn-switch { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <img src="https://raw.githubusercontent.com/rukmansyahlutfi22-code/1111177777777/main/Kabupaten%20Kotabaru.png" class="logo-desa">
        <h3>Akses Terbatas</h3>
        <input type="password" id="pinInput" placeholder="PIN" style="padding:15px; margin:20px 0; width:80%; text-align:center;">
        <button class="btn-aksi" onclick="cekAkses()">Masuk</button>
    </div>

    <div id="main-app">
        <h4>Absensi Desa</h4>
        <div class="kamera-box">
            <video id="video" autoplay playsinline></video>
            <button class="btn-switch" onclick="switchKamera()">🔄 Balik Kamera</button>
        </div>
        <button class="btn-aksi" onclick="kirimData()">Simpan & Kirim</button>
    </div>
</div>

<script>
    let currentMode = "user"; // Default kamera depan
    const video = document.getElementById('video');

    function aktifkanKamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: currentMode } })
            .then(stream => video.srcObject = stream);
    }

    function switchKamera() {
        currentMode = (currentMode === "user") ? "environment" : "user";
        aktifkanKamera();
    }

    function cekAkses() {
        if(document.getElementById('pinInput').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            aktifkanKamera();
        }
    }
</script>
</body>
</html>
